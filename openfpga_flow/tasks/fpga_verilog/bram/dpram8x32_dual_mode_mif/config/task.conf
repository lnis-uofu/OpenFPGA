# Configuration file for running experiments
# = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = =
# timeout_each_job : FPGA Task script splits fpga flow into multiple jobs
# Each job execute fpga_flow script on combination of architecture & benchmark
# timeout_each_job is timeout for each job
# = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = = =

[GENERAL]
run_engine=openfpga_shell
power_tech_file = ${PATH:OPENFPGA_PATH}/openfpga_flow/tech/PTM_45nm/45nm.xml
power_analysis = false
spice_output=false
verilog_output=true
timeout_each_job = 20*60
fpga_flow=yosys_vpr

[OpenFPGA_SHELL]
openfpga_shell_template=${PATH:OPENFPGA_PATH}/openfpga_flow/openfpga_shell_scripts/fix_mif_device_example_script.openfpga
openfpga_arch_file=${PATH:OPENFPGA_PATH}/openfpga_flow/openfpga_arch/k6_frac_N10_adder_chain_mem256preload_40nm_openfpga.xml
openfpga_sim_setting_file=${PATH:OPENFPGA_PATH}/openfpga_flow/openfpga_simulation_settings/fixed_sim_openfpga.xml
# VPR parameter
openfpga_vpr_device_layout=3x2
openfpga_vpr_route_chan_width=100
openfpga_vpr_fix_pins_file=${PATH:TASK_DIR}/config/fix_pins.place
openfpga_bitstream_setting_file=${PATH:TASK_DIR}/config/bitstream_setting.xml
openfpga_bus_group_gen_script=${PATH:OPENFPGA_PATH}/openfpga_flow/scripts/bus_group_gen.py
openfpga_bus_group_task_file=${PATH:TASK_DIR}/config/dual_port_ram_8x16_mif_bus_group_task.yaml

[ARCHITECTURES]
arch0=${PATH:OPENFPGA_PATH}/openfpga_flow/vpr_arch/k6_frac_N10_tileable_adder_chain_mem256preload_40nm.xml

[BENCHMARKS]
bench0=${PATH:OPENFPGA_PATH}/openfpga_flow/benchmarks/micro_benchmark/dual_port_ram_8x16_mif/dual_port_ram_8x16_mif.v,${PATH:OPENFPGA_PATH}/openfpga_flow/benchmarks/micro_benchmark/dual_port_ram_8x16_mif/init.hex
bench1=${PATH:OPENFPGA_PATH}/openfpga_flow/benchmarks/micro_benchmark/dual_port_ram_8x32_mif/dual_port_ram_8x32_mif.v,${PATH:OPENFPGA_PATH}/openfpga_flow/benchmarks/micro_benchmark/dual_port_ram_8x32_mif/init.hex
bench2=${PATH:OPENFPGA_PATH}/openfpga_flow/benchmarks/micro_benchmark/dual_port_ram_8x16_8x32_mif/dual_port_ram_8x16_8x32_mif.v,${PATH:OPENFPGA_PATH}/openfpga_flow/benchmarks/micro_benchmark/dual_port_ram_8x16_8x32_mif/init_8x16.hex,${PATH:OPENFPGA_PATH}/openfpga_flow/benchmarks/micro_benchmark/dual_port_ram_8x16_8x32_mif/init_8x32.hex

[SYNTHESIS_PARAM]
# Yosys script parameters
bench_yosys_cell_sim_verilog_common=${PATH:OPENFPGA_PATH}/openfpga_flow/openfpga_yosys_techlib/dpram8x32_preload_cell_sim.v
bench_yosys_bram_map_rules_common=${PATH:OPENFPGA_PATH}/openfpga_flow/openfpga_yosys_techlib/dpram8x32_preload_bram.txt
bench_yosys_bram_map_verilog_common=${PATH:OPENFPGA_PATH}/openfpga_flow/openfpga_yosys_techlib/dpram8x32_preload_bram_map.v
bench_read_verilog_options_common = -nolatches
bench_yosys_common=${PATH:OPENFPGA_PATH}/openfpga_flow/misc/ys_tmpl_yosys_vpr_bram_flow.ys
bench_yosys_rewrite_common=${PATH:OPENFPGA_PATH}/openfpga_flow/misc/ys_tmpl_yosys_vpr_flow_with_rewrite.ys

bench0_top = dual_port_ram_128
bench0_openfpga_bus_group_task_file=${PATH:TASK_DIR}/config/dual_port_ram_8x16_mif_bus_group_task.yaml
bench0_openfpga_vpr_fix_pins_file=${PATH:TASK_DIR}/config/dual_port_ram_128.place

bench1_top = dual_port_ram_8x32
bench1_openfpga_bus_group_task_file=${PATH:TASK_DIR}/config/dual_port_ram_8x32_mif_bus_group_task.yaml
bench1_openfpga_vpr_fix_pins_file=${PATH:TASK_DIR}/config/dual_port_ram_8x32.place

bench2_top = dual_port_ram_8x16_8x32
bench2_openfpga_bus_group_task_file=${PATH:TASK_DIR}/config/dual_port_ram_8x16_8x32_mif_bus_group_task.yaml
bench2_openfpga_vpr_fix_pins_file=${PATH:TASK_DIR}/config/dual_port_ram_8x16_8x32.place

[SCRIPT_PARAM_MIN_ROUTE_CHAN_WIDTH]
#end_flow_with_test=
#vpr_fpga_verilog_formal_verification_top_netlist=
